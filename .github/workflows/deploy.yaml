name: Deploy to Lambda

on:
  workflow_run:
    workflows: ["Build and Push to ECR"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Get latest image tag from build
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            TAG=$(echo '${{ toJson(github.event.workflow_run.head_sha) }}' | tr -d '"')
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Update Lambda with new image
        run: |
          aws lambda update-function-code \
            --function-name zota-ssap-lambda \
            --image-uri ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/zota-ssap-repo:${{ steps.get-tag.outputs.tag }}