name: Deploy to Lambda

on:
  workflow_run:
    workflows: ["Build and Push to ECR"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 2.2, 3.0)'
        required: true
      full_version:
        description: 'version'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Determine version to deploy
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual deployment
            VERSION="${{ github.event.inputs.version }}"
            FULL_VERSION="${{ github.event.inputs.full_version }}"
          else
            # Automatic deployment from build
            # Extract version from build workflow
            VERSION="$(echo '${{ toJson(github.event.workflow_run.head_sha) }}' | tr -d '"')"
            # You'd need to pass this properly from build
            VERSION="latest"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Update Lambda with new image
        run: |
          echo "Update Lambda function with image version: ${{ steps.version.outputs.version }}"
          
          aws lambda update-function-code \
            --function-name zota-ssap-lambda \
            --image-uri ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/zota-ssap-repo:${{ steps.version.outputs.version }}
          
          echo "Lambda update initiated"

      - name: Wait for update to complete
        run: |
          echo "Waiting for Lambda update to complete..."
          while [[ $(aws lambda get-function --function-name zota-ssap-lambda --query 'Configuration.LastUpdateStatus' --output text) == "InProgress" ]]; do
            echo "updating... (waiting 5 seconds)"
            sleep 5
          done
          
          FINAL_STATUS=$(aws lambda get-function --function-name zota-ssap-lambda --query 'Configuration.LastUpdateStatus' --output text)
          echo "Lambda update completed with status: $FINAL_STATUS"

      - name: Test Lambda
        run: |
          echo "Testing Lambda function..."
          
          aws lambda invoke \
            --function-name zota-ssap-lambda \
            --payload '{"queryStringParameters": {"key": "test.txt"}}' \
            --cli-binary-format raw-in-base64-out \
            response.json
          
          echo "Response:"
          cat response.json
          echo ""
          
          # Also test via URL
          echo ""
          echo "Testing via Function URL:"
          curl "https://mpefgbx3iq7xt4anf5fyrvt77i0otzfn.lambda-url.ap-southeast-1.on.aws/?key=test.txt"