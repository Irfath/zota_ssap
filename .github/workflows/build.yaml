name: Build and Push to ECR

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2.2, 3.0) - Leave empty for auto'
        required: false
        default: ''
      bump_major:
        description: 'Bump major version? (yes/no)'
        required: false
        default: 'no'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          
          # Manual version input
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manual version: $VERSION"
          
          # Git tag (v1.0, v2.0, etc.)
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "Using Git tag version: $VERSION"
          
          # Auto-increment from ECR
          else
            echo "Auto-incrementing version from ECR..."
            
            # Get the latest version tag from ECR
            LATEST_VERSION=$(aws ecr describe-images \
              --repository-name zota-ssap-repo \
              --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null | grep -oE '^[0-9]+\.[0-9]+' || echo "1.0")
            
            MAJOR=$(echo $LATEST_VERSION | cut -d. -f1)
            MINOR=$(echo $LATEST_VERSION | cut -d. -f2)
            
            echo "Latest version in ECR: $LATEST_VERSION"
            
            # Check for major bump
            if [ "${{ github.event.inputs.bump_major }}" == "yes" ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              echo "Bumping major version to $MAJOR"
            else
              MINOR=$((MINOR + 1))
              echo "Bumping minor version to $MINOR"
            fi
            
            VERSION="${MAJOR}.${MINOR}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          echo "================================="
          echo "Version: $VERSION"
          echo "Full version: ${VERSION}-${SHORT_SHA}"
          echo "================================="

      - name: Build Go binary
        run: |
          cd app
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o main main.go
          cd ..

      - name: Copy binary to docker folder
        run: cp app/main docker/

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: zota-ssap-repo
          VERSION: ${{ steps.version.outputs.version }}
          FULL_VERSION: ${{ steps.version.outputs.full_version }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          GIT_SHA: ${{ github.sha }}
        run: |
          cd docker
          
          echo "Building Docker image with tags:"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:$GIT_SHA"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:$FULL_VERSION"
          
          # Build with primary tag
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$GIT_SHA .
          
          # Add additional tags
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$GIT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$GIT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$GIT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:$FULL_VERSION
          
          # Push all tags
          echo "Pushing to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$GIT_SHA
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$FULL_VERSION
          
          echo "Image pushed successfully!"

      - name: Trigger deployment
        run: |
          gh workflow run deploy.yaml --ref main -f version="${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}